name: Update hundo CP data

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate data
        run: python scripts/generate_data.py

      - name: Commit changes if data changed
        run: |
          if git diff --quiet -- data/hundo_cp.json; then
            echo "No changes to data/hundo_cp.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hundo_cp.json
          git commit -m "Update hundo CP data"
          git push
